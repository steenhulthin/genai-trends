project:
  name: genai-trends
  purpose: >
    Help users understand which of a small set of predefined generative AI
    terms are gaining or losing momentum in Guardian coverage over time.

topics:
  predefined: true
  initial:
    - Claude
    - Anthropic
    - ChatGPT
    - OpenAI

comparison_groups:
  - label: Claude + Anthropic
    topics:
      - Claude
      - Anthropic
  - label: ChatGPT + OpenAI
    topics:
      - ChatGPT
      - OpenAI

tracked_items:
  allowed_forms:
    - single_word
    - product_or_company_name
  examples:
    - OpenAI
    - ChatGPT
  source_file: tracked-items.yml
  seed_mode: manual_seed_list
  future_direction: may_be_expanded_later
  overlapping_topic_membership: not_required

data_sources:
  priority_order:
    - news_mentions
  grouping_required: true
  selected:
    news_mentions: guardian
  alternatives:
    news_mentions:
      - gdelt_web_ngrams
  deferred:
    - additional_sources

metrics:
  source_specific:
    - news_mentions_frequency
  primary_metric: news_mentions_frequency
  on_missing_source: warn_and_keep_remaining_data

time:
  granularity:
    default: weekly
    allowed:
      - weekly
  fetch_window_weeks: 26
  max_fetch_window_weeks: 52
  reload_behavior:
    on_page_load: true
    on_filter_change: true
    on_browser_refresh: true

user_capabilities:
  - merged_group_comparison
  - weekly_time_window_slider
  - current_window_visibility

deployment:
  default_stack: streamlit
  default_host: share_streamlit_io
  allowed_stacks:
    - streamlit
    - stlite
    - shinylive
    - wasm
    - static_site
  allowed_hosts:
    - github_pages
    - share_streamlit_io
  fetching_preferences:
    server_fetching_allowed: true
    server_caching_allowed: true
    soft_prefer_client_or_static_fetching: true

seed_option:
  tracked_items: simplified_guardian_four
