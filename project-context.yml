project:
  name: genai-trends
  purpose: >
    Help users understand which generative AI topics and terms are gaining
    or losing momentum over time.

topics:
  predefined: true
  initial:
    - prompt engineering
    - advanced software production with agents
    - general

tracked_items:
  allowed_forms:
    - single_word
    - short_phrase
  examples:
    - vibe coding
    - Ralph Wiggum Loop
  source_file: tracked-items.yml
  seed_mode: manual_seed_list
  future_direction: may_be_evaluated_dynamically_later
  overlapping_topic_membership: allowed
  overlap_rule: include_in_all_relevant_topics

data_sources:
  priority_order:
    - social_media
    - news_mentions
    - google_trends
  grouping_required: true
  selected:
    social_media: bluesky
    news_mentions: gdelt
    google_trends: google_trends
  deferred:
    - mastodon
    - hacker_news

metrics:
  source_specific:
    - frequency
  composite_score:
    formula: >
      social_frequency * social_factor +
      news_frequency * news_factor +
      google_trends_frequency * google_trends_factor
    factors_fixed: true
    factors:
      social: 0.5
      news: 0.3
      google_trends: 0.2
    on_missing_source: warn_and_keep_remaining_data

time:
  granularity:
    default: daily
    allowed:
      - daily
      - weekly
      - monthly
  reload_behavior:
    on_page_load: true
    on_filter_change: true
    on_browser_refresh: true

user_capabilities:
  - topic_drilldown
  - granularity_filter
  - date_range_filter
  - data_export
  - data_dictionary_download

deployment:
  default_stack: streamlit
  default_host: share_streamlit_io
  allowed_stacks:
    - streamlit
    - stlite
    - shinylive
    - wasm
    - static_site
  allowed_hosts:
    - github_pages
    - share_streamlit_io
  fetching_preferences:
    server_fetching_allowed: true
    server_caching_allowed: true
    soft_prefer_client_or_static_fetching: true

export:
  default_format: csv
  documentation_file: data-dictionary.md
  documentation_downloadable_in_ui: true

seed_option:
  tracked_items: A
